<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password - MYFUNDI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="reset-password">
  <header class="topbar">
    <a class="brand" href="index.html">MyFundi</a>
    <nav class="topnav">
      <a href="index.html">Home</a>
      <a href="index.html#workers">Find Workers</a>
      <a href="booking.html">Book Service</a>
    </nav>
    <a class="ghost-btn" href="register.html">Register</a>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h2>Set a New Password</h2>
      <p class="muted">Enter your new password below.</p>
      <p id="resetTokenStatus" class="muted">Verifying reset link...</p>
      <form id="resetPasswordForm" hidden>
        <input id="reset_token" type="hidden" name="token">

        <label for="reset_password">New Password</label>
        <div class="password-wrap">
          <input type="password" id="reset_password" name="password" required>
          <button type="button" class="pw-toggle" data-target="reset_password" data-state="hidden" aria-label="Show password">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>

        <label for="reset_confirm_password">Confirm New Password</label>
        <div class="password-wrap">
          <input type="password" id="reset_confirm_password" name="confirm_password" required>
          <button type="button" class="pw-toggle" data-target="reset_confirm_password" data-state="hidden" aria-label="Show password">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>

        <button class="btn" type="submit">Set New Password</button>
      </form>
      <p id="resetPasswordMessage" class="muted"></p>
    </section>
  </main>

  <footer class="site-footer">MyFundi authentication</footer>
  <script src="assets/js/script.js"></script>
</body>
</html>
