<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password - MYFUNDI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="forgot-password">
  <header class="topbar">
    <a class="brand" href="index.html">MyFundi</a>
    <nav class="topnav">
      <a href="index.html">Home</a>
      <a href="index.html#workers">Find Workers</a>
      <a href="booking.html">Book Service</a>
    </nav>
    <a class="ghost-btn" href="register.html">Register</a>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h2>Forgot Your Password?</h2>
      <p class="muted">Enter your email address and we will send you a link to reset your password.</p>
      <form id="forgotPasswordForm">
        <label for="forgot_email">Email</label>
        <input id="forgot_email" name="email" type="email" required placeholder="Your email address">
        <button class="btn" type="submit">Send Reset Link</button>
      </form>
      <p id="forgotPasswordMessage" class="muted"></p>
      <p class="auth-switch">Remembered it? <a href="login.html">Sign in</a></p>
    </section>
  </main>

  <footer class="site-footer">MyFundi authentication</footer>
  <script src="assets/js/script.js"></script>
</body>
</html>
